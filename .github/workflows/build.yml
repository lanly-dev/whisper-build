name: Whisper.cpp Builder

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  whisper:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # --- LINUX STEP ---
      - name: Build Whisper for Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential cmake git pkg-config
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="$HOME/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build

      # --- MACOS STEP ---
      - name: Build Whisper for macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          brew update && brew install cmake git pkg-config
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="$HOME/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(sysctl -n hw.logicalcpu)"
          cmake --install build

      # --- WINDOWS STEP ---
      - name: Setup MSYS2 for Windows
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel git mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ncurses

      - name: Build Whisper for Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -G "MSYS Makefiles" -DCMAKE_INSTALL_PREFIX="$PWD/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build

      # --- LIST ACTUAL INSTALLED FILES ---
      - name: List installed files (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          find /home/runner/whisper_target -type f | head -50

      - name: List installed files (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          find /Users/runner/whisper_target -type f | head -50

      - name: List installed files (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          find whisper.cpp/../whisper_target -type f | head -50

      # --- CREATE INSTALL-LIKE TREE FOR ffmpeg CONSUMPTION ---
      # Structure: whisper_install/
      #   include/whisper.h ... (headers)
      #   lib/libwhisper.a     (static library)
      #   lib/pkgconfig/whisper.cpp.pc
      #   lib/cmake/Whisper/WhisperConfig.cmake

      - name: Package Linux install tree
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd /home/runner
          tar czf whisper_install-linux-x86_64.tar.gz whisper_target/
          ls -lh whisper_install-linux-x86_64.tar.gz

      - name: Package macOS install tree
        if: matrix.os == 'macos-latest'
        run: |
          cd /Users/runner
          tar czf whisper_install-darwin-universal.tar.gz whisper_target/
          ls -lh whisper_install-darwin-universal.tar.gz

      - name: Package Windows install tree
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd whisper.cpp
          tar czf ../whisper_install-windows-x86_64.tar.gz -C .. whisper_target/
          ls -lh ../whisper_install-windows-x86_64.tar.gz

      # --- ARTIFACT UPLOADS ---
      - name: Upload Linux Install Tree
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v8
        with:
          name: whisper_install-linux-x86_64
          path: /home/runner/whisper_install-linux-x86_64.tar.gz

      - name: Upload macOS Install Tree
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v8
        with:
          name: whisper_install-darwin-universal
          path: /Users/runner/whisper_install-darwin-universal.tar.gz

      - name: Upload Windows Install Tree
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v8
        with:
          name: whisper_install-windows-x86_64
          path: whisper.cpp/whisper_install-windows-x86_64.tar.gz

  # --- RELEASE JOB ---
  release:
    needs: whisper
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release dir
        run: mkdir -p release

      - name: Download Linux Install Tree
        uses: actions/download-artifact@v8
        with:
          name: whisper_install-linux-x86_64
          path: release

      - name: Download macOS Install Tree
        uses: actions/download-artifact@v8
        with:
          name: whisper_install-darwin-universal
          path: release

      - name: Download Windows Install Tree
        uses: actions/download-artifact@v8
        with:
          name: whisper_install-windows-x86_64
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_id }}
          name: Whisper.cpp Install Tree ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}