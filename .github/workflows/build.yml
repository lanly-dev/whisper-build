name: Whisper.cpp Builder

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  whisper:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # --- LINUX STEP ---
      - name: Build Whisper for Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential cmake git pkg-config
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="$HOME/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build

      # --- MACOS STEP ---
      - name: Build Whisper for macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          brew update && brew install cmake git pkg-config
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="$HOME/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(sysctl -n hw.logicalcpu)"
          cmake --install build

      # --- WINDOWS STEP ---
      - name: Setup MSYS2 for Windows
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel git mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ncurses

      - name: Build Whisper for Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -G "MSYS Makefiles" -DCMAKE_INSTALL_PREFIX="$PWD/../whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build

      # --- UPLOAD PC FILES TO RELEASE ---
      - name: Upload Linux .pc file
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-linux.pc
          path: /home/runner/whisper_target/lib/pkgconfig/whisper.cpp.pc

      - name: Upload macOS .pc file
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-macos.pc
          path: /Users/runner/whisper_target/lib/pkgconfig/whisper.cpp.pc

      - name: Upload Windows .pc file
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-windows.pc
          path: C:/Users/Runner/whisper_target/lib/pkgconfig/whisper.cpp.pc

  # --- RELEASE JOB ---
  release:
    needs: whisper
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release dir
        run: mkdir -p release

      - name: Download Linux .pc file
        uses: actions/download-artifact@v4
        with:
          name: whisper-linux.pc
          path: release

      - name: Download macOS .pc file
        uses: actions/download-artifact@v4
        with:
          name: whisper-macos.pc
          path: release

      - name: Download Windows .pc file
        uses: actions/download-artifact@v4
        with:
          name: whisper-windows.pc
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_id }}
          name: Whisper.cpp pkg-config files ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/*.pc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}