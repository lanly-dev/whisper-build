name: Whisper.cpp Builder

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  whisper:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # --- LINUX STEP ---
      - name: Build Whisper for Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential cmake git pkg-config
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="$HOME/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build
          # Verify.pc was installed
          echo "=== Installed files ==="
          find "$HOME/whisper_target" -name "*.pc" 2>/dev/null || true
          ls -la "$HOME/whisper_target/lib/pkgconfig/" 2>/dev/null || ls -la "$HOME/whisper_target/lib64/pkgconfig/" 2>/dev/null || echo "No pkgconfig dir found"

      # --- MACOS STEP ---
      - name: Build Whisper for macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          brew update && brew install cmake git pkg-config
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="$HOME/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(sysctl -n hw.logicalcpu)"
          cmake --install build
          echo "=== Installed files ==="
          find "$HOME/whisper_target" -name "*.pc" 2>/dev/null || true
          ls -la "$HOME/whisper_target/lib/pkgconfig/" 2>/dev/null || ls -la "$HOME/whisper_target/lib64/pkgconfig/" 2>/dev/null || echo "No pkgconfig dir found"

      # --- WINDOWS STEP ---
      - name: Setup MSYS2 for Windows
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel git mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ncurses

      - name: Build Whisper for Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -G "MSYS Makefiles" -DCMAKE_INSTALL_PREFIX="$PWD/../whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build
          echo "=== Installed files ==="
          find "$PWD/../whisper_target" -name "*.pc" 2>/dev/null || true
          ls -la "$PWD/../whisper_target/lib/pkgconfig/" 2>/dev/null || ls -la "$PWD/../whisper_target/lib/pkgconfig/" 2>/dev/null || echo "No pkgconfig dir found"

      # --- ARTIFACT UPLOADS ---
      - name: Upload Linux Artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-compiled-ubuntu-latest
          path: /home/runner/whisper_target/

      - name: Upload macOS Artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-compiled-macos-latest
          path: /Users/runner/whisper_target/

      - name: Upload Windows Artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-compiled-windows-latest
          path: whisper_target/

  # --- RELEASE JOB ---
  release:
    needs: whisper
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: whisper-compiled-ubuntu-latest
          path: release/linux

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: whisper-compiled-macos-latest
          path: release/macos

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: whisper-compiled-windows-latest
          path: release/windows

      - name: List downloaded files
        run: find release/ -type f

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${GITHUB_RUN_ID}"
          echo "Creating tag: $TAG"

          # Create release using GitHub CLI
          gh release create "$TAG" \
            --title "Whisper.cpp Build ${GITHUB_SHA::8}" \
            --generate-notes \
            release/linux/* release/macos/* release/windows/* 2>&1 || {
              echo "Release creation failed, trying without notes..."
              gh release create "$TAG" \
                --title "Whisper.cpp Build ${GITHUB_SHA::8}" \
                release/linux/* release/macos/* release/windows/* 2>&1
            }

          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/$TAG"
