name: Whisper.cpp Builder

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run at 00:00 UTC on the first day of every month
    - cron: '0 0 1 * *'

jobs:
  whisper:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      # --- LINUX STEP ---
      - name: Build Whisper for Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential cmake git pkg-config
          cd ${{ github.workspace }}
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build

      # --- MACOS STEP ---
      - name: Build Whisper for macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          brew update && brew install cmake git pkg-config
          cd ${{ github.workspace }}
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/whisper_target" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(sysctl -n hw.logicalcpu)"
          cmake --install build

      # --- WINDOWS STEP ---
      - name: Setup MSYS2 for Windows
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel git mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ncurses

      - name: Build Whisper for Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd "$(cygpath -u "${{ github.workspace }}")"
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          INSTALL_PREFIX="$(cygpath -u "${{ github.workspace }}/whisper_target")"
          cmake -B build -G "MSYS Makefiles" -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build
          # ggml libraries are installed without the 'lib' prefix (e.g. ggml.a instead
          # of libggml.a). MinGW's linker requires the 'lib' prefix for -l flags.
          for lib in "$INSTALL_PREFIX/lib"/*.a; do
            base=$(basename "$lib")
            case "$base" in lib*) ;; *) cp "$lib" "$INSTALL_PREFIX/lib/lib${base}" ;; esac
          done

      # --- FIX INSTALL TREE ---
      # whisper.cpp's CMake install has two issues:
      # 1. ggml libs are installed without the 'lib' prefix (e.g. ggml.a instead of libggml.a)
      #    MinGW's linker requires the 'lib' prefix to resolve -lggml flags in whisper.pc
      # 2. whisper.pc may not list all ggml static libs needed for static linking
      # We fix both here so downstream consumers (like FFmpeg) can link correctly.

      - name: Fix install tree (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd "${{ github.workspace }}/whisper_target/lib"
          # Add lib prefix to any .a files missing it
          for lib in *.a; do
            case "$lib" in lib*) ;; *) cp "$lib" "lib${lib}" ;; esac
          done
          # Regenerate whisper.pc with all ggml libs
          GGML_LIBS=""
          for lib in ggml ggml-base ggml-cpu ggml-alloc ggml-backend; do
            [ -f "lib${lib}.a" ] && GGML_LIBS="$GGML_LIBS -l${lib}"
          done
          {
            echo 'prefix=${pcfiledir}/../..'
            echo 'exec_prefix=${prefix}'
            echo 'libdir=${prefix}/lib'
            echo 'includedir=${prefix}/include'
            echo
            echo 'Name: whisper'
            echo "Description: Port of OpenAI's Whisper model in C/C++"
            echo 'Version: 1.9.1'
            echo "Libs: -L\${libdir} -lwhisper$GGML_LIBS"
            echo 'Libs.private: -lstdc++ -lm -lpthread'
            echo 'Cflags: -I${includedir}'
          } > pkgconfig/whisper.pc

      - name: Fix install tree (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd "${{ github.workspace }}/whisper_target/lib"
          # Add lib prefix to any .a files missing it
          for lib in *.a; do
            case "$lib" in lib*) ;; *) cp "$lib" "lib${lib}" ;; esac
          done
          # Regenerate whisper.pc with all ggml libs
          GGML_LIBS=""
          for lib in ggml ggml-base ggml-cpu ggml-alloc ggml-backend ggml-metal; do
            [ -f "lib${lib}.a" ] && GGML_LIBS="$GGML_LIBS -l${lib}"
          done
          {
            echo 'prefix=${pcfiledir}/../..'
            echo 'exec_prefix=${prefix}'
            echo 'libdir=${prefix}/lib'
            echo 'includedir=${prefix}/include'
            echo
            echo 'Name: whisper'
            echo "Description: Port of OpenAI's Whisper model in C/C++"
            echo 'Version: 1.9.1'
            echo "Libs: -L\${libdir} -lwhisper$GGML_LIBS"
            echo 'Libs.private: -lstdc++ -lm -lpthread -framework Accelerate -framework Foundation -framework Metal -framework MetalKit'
            echo 'Cflags: -I${includedir}'
          } > pkgconfig/whisper.pc

      - name: Fix install tree (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd "$(cygpath -u "${{ github.workspace }}/whisper_target")/lib"
          # Add lib prefix to any .a files missing it
          for lib in *.a; do
            case "$lib" in lib*) ;; *) cp "$lib" "lib${lib}" ;; esac
          done
          # Regenerate whisper.pc with all ggml libs
          GGML_LIBS=""
          for lib in ggml ggml-base ggml-cpu ggml-alloc ggml-backend; do
            [ -f "lib${lib}.a" ] && GGML_LIBS="$GGML_LIBS -l${lib}"
          done
          {
            echo 'prefix=${pcfiledir}/../..'
            echo 'exec_prefix=${prefix}'
            echo 'libdir=${prefix}/lib'
            echo 'includedir=${prefix}/include'
            echo
            echo 'Name: whisper'
            echo "Description: Port of OpenAI's Whisper model in C/C++"
            echo 'Version: 1.9.1'
            echo "Libs: -L\${libdir} -lwhisper$GGML_LIBS"
            echo 'Libs.private: -lstdc++ -lm -lpthread'
            echo 'Cflags: -I${includedir}'
          } > pkgconfig/whisper.pc

      # --- LIST INSTALLED FILES FOR DEBUGGING ---
      - name: List installed files (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "=== Installed files ==="
          find "${{ github.workspace }}/whisper_target" -type f 2>/dev/null || echo "whisper_target not found!"
          echo "=== whisper.pc ==="
          cat "${{ github.workspace }}/whisper_target/lib/pkgconfig/whisper.pc"

      - name: List installed files (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "=== Installed files ==="
          find "${{ github.workspace }}/whisper_target" -type f 2>/dev/null || echo "whisper_target not found!"
          echo "=== whisper.pc ==="
          cat "${{ github.workspace }}/whisper_target/lib/pkgconfig/whisper.pc"

      - name: List installed files (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          echo "=== Installed files ==="
          find "$(cygpath -u "${{ github.workspace }}/whisper_target")" -type f 2>/dev/null | head -50 || echo "whisper_target not found!"
          echo "=== whisper.pc ==="
          cat "$(cygpath -u "${{ github.workspace }}/whisper_target")/lib/pkgconfig/whisper.pc"

      # --- CREATE INSTALL-LIKE TREE FOR ffmpeg CONSUMPTION ---

      - name: Package Linux install tree
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd ${{ github.workspace }}
          tar czf whisper_install-linux-x86_64.tar.gz whisper_target/

      - name: Package macOS install tree
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd ${{ github.workspace }}
          tar czf whisper_install-darwin-universal.tar.gz whisper_target/

      - name: Package Windows install tree
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd "$(cygpath -u "${{ github.workspace }}")"
          tar czf whisper_install-windows-x86_64.tar.gz whisper_target/

      # --- ARTIFACT UPLOADS ---
      - name: Upload Linux Install Tree
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper_install-linux-x86_64
          path: ${{ github.workspace }}/whisper_install-linux-x86_64.tar.gz

      - name: Upload macOS Install Tree
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper_install-darwin-universal
          path: ${{ github.workspace }}/whisper_install-darwin-universal.tar.gz

      - name: Upload Windows Install Tree
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper_install-windows-x86_64
          path: ${{ github.workspace }}/whisper_install-windows-x86_64.tar.gz

  # --- RELEASE JOB (on push to main/master or schedule) ---
  release:
    needs: whisper
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Fetch all tags for accurate increment
        run: |
          git fetch --unshallow 2>/dev/null || git fetch --tags origin 2>/dev/null || true

      - name: Create release dir
        run: mkdir -p release

      - name: Get whisper.cpp commit hash (last 3 chars)
        id: whisper_commit
        shell: bash
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper_comm
          WHISPER_LAST3=$(cd /tmp/whisper_comm && git rev-parse --short=3 HEAD)
          echo "WHISPER_LAST3=$WHISPER_LAST3" >> $GITHUB_OUTPUT

      - name: Compute global increment from existing tags
        id: tag
        shell: bash
        run: |
          # Get current date in YYYY.MM.DD format
          DATE=$(date +%Y.%m.%d)

          # Get last 3-char whisper commit suffix
          WHISPER_LAST3="${{ steps.whisper_commit.outputs.WHISPER_LAST3 }}"

          # Find all tags matching vYYYY.MM.DD-XXXX-NNNN format and extract the global increment (last 4 digits)
          # This ensures we increment based on actual release tags, not all git tags
          LATEST_INCREMENT=$(git tag -l 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-????-[0-9][0-9][0-9][0-9]' 2>/dev/null | \
            grep -oE '[0-9]{4}$' | \
            sort -n | \
            tail -1 || true)

          if [ -z "$LATEST_INCREMENT" ]; then
            INCREMENT=0
          else
            INCREMENT=$((10#$LATEST_INCREMENT + 1))
          fi

          TAG_NAME="v${DATE}-${WHISPER_LAST3}-$(printf '%04d' $INCREMENT)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download Linux Install Tree
        uses: actions/download-artifact@v4
        with:
          name: whisper_install-linux-x86_64
          path: release

      - name: Download macOS Install Tree
        uses: actions/download-artifact@v4
        with:
          name: whisper_install-darwin-universal
          path: release

      - name: Download Windows Install Tree
        uses: actions/download-artifact@v4
        with:
          name: whisper_install-windows-x86_64
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Whisper.cpp Install Tree ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
