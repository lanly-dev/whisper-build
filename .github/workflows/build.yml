name: Build whisper.cpp

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        cmake_build_type: [Release]

        include:
          - os: ubuntu-latest
            cc: gcc
            cpp: g++
          - os: windows-latest
            cc: cl
            cpp: cl
          - os: macos-latest
            cc: clang
            cpp: clang++

    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/whisper.cpp
          path: whisper.cpp

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: whisper.cpp
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..

      - name: Configure CMake (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: whisper.cpp
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.cmake_build_type }} ..

      - name: Build whisper.cpp
        working-directory: whisper.cpp/build
        run: cmake --build . --config ${{ matrix.cmake_build_type }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: whisper-bin-${{ matrix.os }}
          path: whisper.cpp/build/bin/